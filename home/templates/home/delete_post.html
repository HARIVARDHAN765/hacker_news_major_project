{% extends "home/base.html" %}

{% block title %}
Delete Post
{% endblock %}

{% block content %}

<h2>Delete Post</h2>

<p>

    Are you sure you want to delete this post?

</p>

<p>

    <strong>{{ post.title }}</strong>

</p>

<form method="POST">

    {% csrf_token %}

    <button type="submit">
        Delete
    </button>

    <a href="{% url 'post_detail' post.id %}">
        Cancel
    </a>

</form>

{% endblock %}
