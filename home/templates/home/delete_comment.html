{% extends "home/base.html" %}

{% block title %}
Delete Comment
{% endblock %}

{% block content %}

<h2>Delete Comment</h2>

<p>Are you sure you want to delete this comment?</p>

<p>
    {{ comment.content }}
</p>

<form method="POST">

    {% csrf_token %}

    <button type="submit">
        Delete
    </button>

    <a href="{% url 'post_detail' comment.post.id %}">
        Cancel
    </a>

</form>

{% endblock %}
