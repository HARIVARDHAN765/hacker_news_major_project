{% extends "home/base.html" %}

{% block title %}
Edit Post
{% endblock %}

{% block content %}

<h2>Edit Post</h2>

<form method="POST">

    {% csrf_token %}

    {{ form.non_field_errors }}

    <table>

        <tr>
            <td>Title:</td>
            <td>{{ form.title }}</td>
        </tr>

        <tr>
            <td>URL:</td>
            <td>{{ form.url }}</td>
        </tr>

        <tr>
            <td>Text:</td>
            <td>{{ form.text }}</td>
        </tr>

        <tr>
            <td>Post type:</td>
            <td>{{ form.post_type }}</td>
        </tr>

    </table>

    <br>

    <button type="submit">
        Save Changes
    </button>

    <a href="{% url 'post_detail' post.id %}">
        Cancel
    </a>

</form>

{% endblock %}
